# ============================================================
# Arch Linux Install Configuration
# ============================================================

# TODO: implement per-partition selective wipe using sfdisk
# requires: partition table validation, layout mismatch detection,
# multi-disk selection, fresh vs existing disk handling
partitions:
  esp:    
    size:    512  
    unit:    M
    wipe:    true
  swap:   
    size:    2
    unit:    G
    wipe:    true
    encrypt: true
  root:   
    size:    30  
    unit:    G
    wipe:    true
    fs:      ext4
    encrypt: true
  home:   
    size:    40   
    unit:    G
    wipe:    false
    fs:      ext4
    encrypt: true
    mount:   /home
  media:
    wipe:    false
    fs:      ext4
    encrypt: false
    mount:   /mnt/media

# --- Locale & timezone --------------------------------------
locale:
  lang:     en_US.UTF-8
  timezone: Europe/Bucharest
  keymap:   us

# --- System -------------------------------------------------
system:
  hostname: archie
  kernels:
    - linux
    - linux-lts

# --- Packages (added to base during pacstrap) ---------------
packages:
  - vim
  - networkmanager
  - sudo
  - grub
  - efibootmgr
  - os-prober
  - cryptsetup
  - openssh
  - nftables
  - iptables-nft

# --- Services (enabled or started during services) ---------------
services:
  - name: NetworkManager
    enabled: true
    start: true
  - name: sshd
    enabled: true
    start: true

# --- User ---------------------------------------------------
user:
  name:     raz
  groups:   wheel

# --- Root ---------------------------------------------------
root:
  live: "placeholder"

# --- SSH hardening ------------------------------------------
ssh:
  port: 10022
  allow_users:
    - name: raz
      from: "10.0.0.0/8"
  banner: true
