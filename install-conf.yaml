# ============================================================
# Arch Linux Install Configuration
# ============================================================

# TODO: implement per-partition selective wipe using sfdisk
# requires: partition table validation, layout mismatch detection,
# multi-disk selection, fresh vs existing disk handling
partitions:
  esp:    
    size:    512  
    unit:    M
    wipe:    true
  swap:   
    size:    2
    unit:    G
    wipe:    true
    encrypt: true
  root:   
    size:    30  
    unit:    G
    wipe:    true
    fs:      ext4
    encrypt: true
  home:   
    size:    40   
    unit:    G
    wipe:    false
    fs:      ext4
    encrypt: true
    mount:   /home
  media:
    wipe:    false
    fs:      ext4
    encrypt: false
    mount:   /mnt/media

# --- Locale & timezone --------------------------------------
locale:
  lang:     en_US.UTF-8
  timezone: Europe/Bucharest
  keymap:   us

# --- System -------------------------------------------------
system:
  hostname: archie
  kernels:
    - linux
    - linux-lts

# --- Packages (added to base during pacstrap) ---------------
packages:
  - vim
  - networkmanager
  - sudo
  - grub
  - efibootmgr
  - os-prober
  - cryptsetup
  - openssh
  - nftables
  - iptables-nft
  - nginx
# --- Services (enabled or started during services) ---------------
services:
  - name: NetworkManager
    enabled: true
    start: true
  - name: sshd
    enabled: true
    start: true
  - name: nftables
    enabled: true
    start: true
  - name: nginx
    enabled: true
    start: true
# --- User ---------------------------------------------------
user:
  name:     raz
  groups:   wheel

# --- Root ---------------------------------------------------
root:
  live: "placeholder"

# --- SSH hardening ------------------------------------------
ssh:
  port: 10022
  allow_users:
    - name: raz
      from: "10.0.0.0/8"
  banner: true

firewall:
  icmp:
    enabled: true      # set false only if you know what you're doing
    rate: "10/second"
  interface: []
  inbound:
    - proto: tcp
      dport: 10022
      saddr: "10.0.0.0/8"
      rate: "15/minute"
      comment: "ssh"
  outbound:
    - proto: udp
      dport: 53
      daddr: []
      comment: "dns"
    - proto: udp
      dport: 123
      daddr: []
      comment: "ntp"
    - proto: tcp
      dport: 443
      daddr:
        - "95.217.163.246"   # archlinux.org
        - "176.9.28.202"     # mirror
      comment: "https"
